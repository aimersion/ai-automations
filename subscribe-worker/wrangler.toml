name = "ai-subscribe"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# ── Secrets ───────────────────────────────────────────────────────────────────
# These are NOT stored here. Set each one via:
#   npx wrangler secret put SENDGRID_KEY
#   npx wrangler secret put SHEET_ID
#   npx wrangler secret put GOOGLE_SA_EMAIL
#   npx wrangler secret put GOOGLE_SA_PRIVATE_KEY
#
# GOOGLE_SA_PRIVATE_KEY: paste the private key exactly as it appears in the
# service account JSON (with -----BEGIN PRIVATE KEY----- header/footer).
# Wrangler stores it safely. The worker handles \n → newline conversion.
